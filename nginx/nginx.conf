events {}

http {
  server {
    listen 80;

    location /api/users {
      proxy_pass http://user-service:5000/users;
    }

    location /api/products {
      proxy_pass http://product-service:5001/products;
    }

    location /api/orders {
      proxy_pass http://order-service:5002/orders;
    }
  }
}
